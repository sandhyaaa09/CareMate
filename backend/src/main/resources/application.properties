spring.application.name=backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgresql@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwtSecret=SuperSecretKeyForCareMateApplicationThatIsLongEnoughToProvideSecurity!
app.jwtExpirationMs=86400000

# Server Port
server.port=8080

# Mail Configuration (Mocked/Console logging for dev)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mocked@caremate.com
spring.mail.password=mocked
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
